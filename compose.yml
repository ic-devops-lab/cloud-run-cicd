name: cloud-run-cicd

x-db-env: &db-env
  POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}
  POSTGRES_DB: ${POSTGRES_DB:-app_db}
  POSTGRES_USER: ${POSTGRES_USER:-app_user}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app_pass}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      <<: *db-env
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data:rw
      # - ./scripts/pg/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  api-app:
    build:
      context: .
      dockerfile: src/Dockerfile
    image: cloud-run-cicd-api:local
    container_name: cloud-run-cicd-api
    environment:
      <<: *db-env
      APP_NAME: ${APP_NAME:-cloud-run-cicd-api}
      APP_VERSION: ${APP_VERSION:-local}
      APP_ENV: ${APP_ENV:-local}
      APP_PORT: ${APP_PORT:-8080}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${APP_PORT:-8080}:${APP_PORT:-8080}"
    depends_on:
      - postgres

volumes:
  pg_data:
